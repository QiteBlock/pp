[venue]
kind = "grvt"
api_base_url = "https://api.hibachi.xyz"
data_api_base_url = "https://data-api.hibachi.xyz"
ws_market_url = "wss://data-api.hibachi.xyz/ws/market"
ws_account_url = "wss://api.hibachi.xyz/ws/account"
account_id = 0
api_key = ""
private_key = ""
grvt_chain_id = "325"
grvt_builder_id = ""
grvt_builder_fee = "0"

[runtime]
dry_run = true
restore_dry_run_state = false
reconcile_interval_ms = 2000
generation_min_interval_ms = 2000
stale_market_data_ms = 5000
websocket_send_timeout_ms = 5000
max_orderbook_depth = 100

[network]
private_rest_min_interval_ms = 300
retry_max_attempts = 4
retry_initial_backoff_ms = 250
retry_max_backoff_ms = 2000
websocket_reconnect_backoff_ms = 1000

[model]
born_inf_bps = "2"
born_sup_bps = "6"
v0 = "1.5"
mu = "0.5"
sigma = "2.7"
n_points = 1
min_step_price = "0.001"
min_step_volume = "0.01"
min_trade_amount = "5"
position_size_skew_weight = "0.6"
position_spread_multiplier = "1.2"
position_dead_zone = "0.001"
price_sensitivity_threshold = "0.003"
price_sensitivity_scaling_factor = "0.75"
volume_sensitivity_threshold = "0.10"
volatility_cut_threshold = "0.010"
index_forward_buffer_bps = "0"
max_spread_bps = "8"
prevent_spread_crossing = true
cancel_orders_crossing_mid = true
as_gamma = "0.05"
as_kappa = "3000.0"
as_time_horizon = "0.5"
inventory_lean_bps = "14.0"
as_vol_cap = "0.0003"
# ── Auto-tuning ────────────────────────────────────────────────────────────────
# Online kappa: replace fixed as_kappa with empirical fill-probability estimate
# after kappa_min_cycles observations (~200 cycles = ~100 s at 500 ms interval).
online_kappa = "true"
kappa_min_cycles = "100"
# Fill-rate asymmetry: when one side fills 3× faster, improve the slow side by 1.5 bps.
fill_rate_window_secs = "300"
fill_rate_skew_threshold = "3.0"
fill_rate_competitive_bps = "1.5"
# Funding-rate lean: lean quotes toward the funding-paying side (perps).
# At weight=0.3, a +0.05% funding rate shifts reservation by ~1.5 bps.
funding_lean_weight = "0.5"
# Post-fill widen: after a fill, widen the opposite side for 10 s by 1.3×.
post_fill_widen_secs = "5"
post_fill_widen_multiplier = "1.1"
# VPIN widen: at VPIN > 0.65 spread widens toward 1.4× linearly.
vpin_widen_multiplier = "1.05"

[risk]
max_abs_position_usd = "500"
max_symbol_position_usd = "500"
max_drawdown_usd = "30"
max_open_orders = 20
emergency_widening_bps = "3"
circuit_breaker_cooldown_ms = 2000
emergency_skew_start = "0.65"
emergency_skew_max = "1.50"
max_correlated_position_usd = "500"
emergency_unwind_threshold = "0.8"
emergency_unwind_cycles = 10
stale_position_timeout_secs = 900
stale_position_bid_hold_secs = 600
stale_position_ask_hold_secs = 600
stale_position_close_slippage_cap_bps = "15"
stale_position_close_chunk_base = "0.5"

[factors]
volume_window_secs = 30
n_trade_window_secs = 30
n_trade_quote_threshold = 0
volatility_ewma_alpha = "0.2"
volatility_spread_weight = "20"
inventory_skew_weight = "2.0"
volume_size_weight = "0.005"
flow_imbalance_weight = "0.15"
trade_velocity_alpha = "0.35"
trade_velocity_burst_threshold = "2"
bbo_spread_vol_weight = "0.05"
inventory_risk_constant = "300"
inventory_skew_convexity = "1.0"
regime_min_dwell_secs = 10
cross_symbol_vol_weight = "0.0"
volatility_floor = "0.00005"
ob_imbalance_weight = "1.5"
ob_imbalance_depth = 10
bbo_spread_cap_bps = "20"
flow_spike_pause_threshold = "0.95"
toxic_regime_block_new_positions_secs = 420
toxic_regime_block_new_positions_intensity = "0.7"
# Microprice: BBO size-weighted mid from GRVT v1.mini.d bq/aq fields.
microprice_weight = "1.0"
# VPIN: 5-HYPE buckets, 20-bucket rolling window, widen above 0.65.
vpin_bucket_size = "500.0"
vpin_n_buckets = 20
vpin_widen_threshold = "0.95"

[storage]
enabled = true
db_path = "data/fills-grvt-real.db"

[hedging]
hyperliquid_taker_fee_rate = "0.000432"

[[pairs]]
symbol = "HYPE/USDT-P"
enabled = true
max_position_base = "10"
unwind_only_enter_ratio = "0.75"
unwind_only_exit_ratio = "0.60"
price_source = "mid"
post_only = true
service_on = true
side_filter = "both"
binance_symbol = "hypeusdt"